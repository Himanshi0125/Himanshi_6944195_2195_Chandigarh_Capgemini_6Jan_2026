<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Management Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>Project Management System Registration</h2>

    <form action="signin.html">

        <h3>Personal Information</h3>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>


        <h3>Professional Details</h3>

        <label>Role</label>
        <select>
            <option>Project Manager</option>
            <option>Developer</option>
            <option>Tester</option>
            <option>UI/UX Designer</option>
        </select>

        <label>Department</label>
        <input type="text" placeholder="e.g. IT, Marketing">

        <label>Experience Level</label>
        <select>
            <option>Fresher</option>
            <option>1-3 Years</option>
            <option>3-5 Years</option>
            <option>5+ Years</option>
        </select>


        <h3>Project Preferences</h3>

        <label>Project Type</label>
        <select>
            <option>Web Development</option>
            <option>Mobile App</option>
            <option>AI/ML</option>
            <option>Cloud</option>
        </select>

        <label>Preferred Team Size</label>
        <input type="number" min="1" max="20">

        <label>Tools Known</label>
        <input type="text" placeholder="AWS, Git, MongoDB...">


        <h3>Availability</h3>

        <label>Joining Date</label>
        <input type="date">

        <!-- <button type="submit">Register</button> -->
        <button type="submit">Register</button>
        <p class="login-link">
            Already have an account? 
            <a href="signin.html">Sign In</a>
        </p>

    </form>

</div>

</body>
</html>
